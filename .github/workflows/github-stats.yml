name: Generate Stats Images

on:
  schedule:
    - cron: "0 0 * * *" # 每天凌晨自动运行
  workflow_dispatch: # 允许你手动点击运行
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate GitHub Stats SVG
        uses: teoxoy/profile-readme-stats@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          output: dist
          # 这里可以自定义主题，比如 radical, serpent, dark, tokyonight
          theme: radical

      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./dist
          publish_branch: output # 所有的图都会存在这个分支
